<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Comment Inserter Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>GitHub Comment Inserter</h1>
        <p>Manage the text items that appear in the right-click menu on GitHub.</p>
      </header>

      <div id="result" class="result-panel">
        <h2>Result</h2>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </div>

      <section class="panel">
        <h2>Text items</h2>
        <div class="toolbar">
          <button id="add-item" type="button">Add item</button>
        </div>
        <ul id="items-list" class="items"></ul>
        <p class="hint">Empty items are ignored. The menu updates automatically after saving.</p>
      </section>

      <section class="panel">
        <h2>Batch type</h2>
        <div class="toolbar">
          <button id="add-badge" type="button">Add badge</button>
        </div>
        <ul id="badge-list" class="items"></ul>
        <p class="hint">Each badge needs label, message, and color. These values build the badge URL.</p>
      </section>

      <div class="page-actions">
        <button id="save-all" type="button" class="primary">Save</button>
      </div>
    </main>
    <script src="options.js"></script>
  </body>
</html>
